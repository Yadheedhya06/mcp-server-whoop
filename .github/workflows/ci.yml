name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22, 24]
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - name: Install without lifecycle scripts
        run: npm ci --ignore-scripts
      - name: Build, test, and audit packed artifact
        run: npm run check

  platform-security:
    name: Platform security (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [macos-14, windows-2022]
    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - name: Install without lifecycle scripts
        run: npm ci --ignore-scripts
      - name: Run full macOS release checks
        if: runner.os == 'macOS'
        run: npm run check
      - name: Build and audit the Windows runtime
        if: runner.os == 'Windows'
        run: |
          npm run build
          node --test --import tsx test/auth.test.ts test/windows-security.test.ts
          npm run security:audit

  supply-chain:
    name: Supply-chain evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden runner
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2
        with:
          egress-policy: audit
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 24
          cache: npm
      - name: Install without lifecycle scripts
        run: npm ci --ignore-scripts
      - name: Audit known vulnerabilities
        run: npm audit --audit-level=high
      - name: Verify npm registry signatures
        run: npm audit signatures
      - name: Generate CycloneDX SBOM
        run: npm run security:sbom
      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: cyclonedx-sbom
          path: sbom.cdx.json
          if-no-files-found: error
          retention-days: 30
